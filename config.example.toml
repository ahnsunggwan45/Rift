# Rift example config.  Copy to get started:  cp config.example.toml config.toml
# (config.toml is .gitignore'd — keeps real server addresses out of version control)

[listener]
host = "0.0.0.0:19132"        # Client listen address (UDP). Bedrock default port 19132.
default_server = "lobby"       # Channel clients are routed to on initial connect (must be a key in [servers])
mtu = 1200                     # Negotiated MTU ceiling (576–1500). 1200 recommended for stability.

# MOTD advertised in the server list. Remove this section to proxy the MOTD from default_server as-is.
[motd]
name = "§l§bRift§r Network"
sub = "powered by Rift"
players = 0
max_players = 500
protocol = 1001                # Client protocol number (a mismatch usually still allows login)
version = "1.26.30"            # Version string shown in the client (match your client version)
gametype = "Survival"

[features]
force_vibrant_visuals = true   # Re-enables Vibrant Visuals when the downstream has it turned off
channel_transfer = true        # Intercepts downstream TransferPackets and handles them as seamless channel transfers

# Resource pack serving (optional). The proxy serves .zip/.mcpack files from packs/ to clients — shared across all servers.
[resource_packs]
enabled = false                # Validate in-game before enabling
folder = "packs"
force = false                  # true = clients who decline the pack cannot connect

# Multi-core tuning. Omit or set to 0 to use all logical cores automatically.
[runtime]
# worker_threads = 8
# RakNet ACK/retransmit tick (ms). Default 10 (WaterdogPE parity). Lower = tighter ACK + loss recovery
# for high-ping players, at the cost of more per-connection wakeups. Data is never delayed by this
# (packets flush on send); it only governs ACK/NACK/retransmit timing. Range 1–1000.
# ack_tick_ms = 10

# Observability.
[metrics]
log_interval_secs = 0          # >0 logs throughput and player count periodically
# web_addr = "127.0.0.1:8080"  # Web dashboard + /metrics and /players JSON endpoints.
                               # Note: /players exposes player names and IPs — place behind a firewall if public.
# Performance data collection: when enabled, appends a metrics snapshot as JSONL every N seconds for offline analysis.
# history_file = "metrics.jsonl"
# history_interval_secs = 10

# Out-of-band control channel (optional). A trusted local backend (e.g. the RiftSupport plugin) connects
# here to trigger seamless transfers/kicks WITHOUT sending a TransferPacket through the game stream —
# so the proxy never has to scan/decode the down stream (zero-decode fast path). Bind to localhost.
# Line protocol:  <token> transfer <name|xuid> <server>   /   <token> kick <name|xuid>
# [control]
# addr = "127.0.0.1:8090"
# token = "change-me-shared-secret"

# Downstream channels. Key = channel name (transfer target), address = backend server address (hostnames supported).
[servers]
lobby    = { address = "127.0.0.1:19133" }
survival = { address = "127.0.0.1:19134" }
# creative = { address = "play.example.com:19135" }
